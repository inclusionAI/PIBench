services:
  gymie-membership:
    build:
      context: .
    container_name: gymie-membership-basic
    restart: unless-stopped
    ports:
      - "8134:8000"
    environment:
      APP_NAME: "Gymie Membership Checkout"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://127.0.0.1:8000"
      APP_LOCALE: en
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
      GYMIE_RESET_DATABASE: "false"
    volumes:
      - gymie_membership_basic_storage:/var/www/html/storage

volumes:
  gymie_membership_basic_storage:
