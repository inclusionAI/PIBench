[task_instance]
name = "Litemall-PCWebPayment-basic"
display_name = "支付宝电脑网站支付基础集成"
description = "在 litemall（Spring Boot + Vue）中接入支付宝电脑网站支付：SDK 依赖、配置类、prepay/notify 接口、前端表单跳转。"
difficulty = "standard"
project = "Litemall"
product = "PCWebPayment"
scenario = "basic"
timeout_sec = 3600

[environment]
dockerfile = "task/Dockerfile"
workdir = "/workspace"

[skills]
required = ["alipay-payment-integration"]

[[runtime_inputs]]
id = "alipay_sandbox"
schema = "alipay.sandbox.v1"
required = true
deliver_as = "file"
env = "ALIPAY_SANDBOX_KEYS_FILE"
workspace_path = "alipay-sandbox-keys.json"
