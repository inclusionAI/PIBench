[task_instance]
name = "BookCars-AuthorizationHold-basic"
display_name = "支付宝资金预授权 - 基础集成"
description = "在 BookCars 租车平台接入支付宝资金预授权：后端 freeze/query/notify 三个 API 端点 + 前端二维码扫码与回调页。"
difficulty = "medium"
project = "BookCars"
product = "AuthorizationHold"
scenario = "basic"
timeout_sec = 3600

[environment]
dockerfile = "task/Dockerfile"
workdir = "/workspace"

[skills]
required = ["alipay-payment-integration"]

[[runtime_inputs]]
id = "alipay_sandbox"
schema = "alipay.sandbox.v1"
required = true
deliver_as = "file"
env = "ALIPAY_SANDBOX_KEYS_FILE"
workspace_path = "alipay-sandbox-keys.json"
